<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product - BabyBoutique</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="js/analytics.js"></script>
  <script src="js/data.js"></script>
  <script src="js/state.js"></script>
  <script src="js/app.js"></script>
</head>
<body class="bg-gray-50 font-sans text-gray-800 antialiased min-h-screen flex flex-col">

  <main class="flex-grow max-w-6xl mx-auto px-4 py-8 w-full">
    <div id="product-container" class="bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden flex flex-col md:flex-row">
      <!-- Image Section -->
      <div class="md:w-1/2 bg-gray-50 h-96 md:h-auto relative">
        <img id="product-image" src="" alt="" class="w-full h-full object-cover">
      </div>
      
      <!-- Details Section -->
      <div class="md:w-1/2 p-8 md:p-12 flex flex-col justify-center">
        <a id="product-category" href="#" class="text-pink-500 font-semibold tracking-wider uppercase text-sm mb-2"></a>
        <h1 id="product-name" class="text-3xl md:text-4xl font-bold text-gray-800 mb-4"></h1>
        
        <div class="flex items-center mb-6 text-yellow-400">
          <span id="product-rating" class="text-lg font-bold text-gray-700 mr-2"></span>
          <span>★★★★☆</span>
          <span class="text-gray-400 text-sm ml-2">(128 reviews)</span>
        </div>
        
        <p id="product-price" class="text-3xl font-extrabold text-gray-900 mb-6"></p>
        <p id="product-desc" class="text-gray-600 mb-8 leading-relaxed"></p>
        
        <div class="flex items-center space-x-4 mb-6">
          <div class="flex border border-gray-300 rounded-lg overflow-hidden">
            <button id="qty-minus" class="px-4 py-2 bg-gray-50 hover:bg-gray-100 text-gray-600 font-bold transition">-</button>
            <input type="number" id="qty-input" value="1" min="1" class="w-16 text-center focus:outline-none border-x border-gray-300">
            <button id="qty-plus" class="px-4 py-2 bg-gray-50 hover:bg-gray-100 text-gray-600 font-bold transition">+</button>
          </div>
        </div>

        <button id="add-to-cart-btn" class="w-full bg-pink-500 hover:bg-pink-600 text-white font-bold py-4 rounded-xl shadow-lg hover:shadow-xl transition flex justify-center items-center">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" /></svg>
          Add to Cart
        </button>
      </div>
    </div>
    
    <div id="error-state" class="hidden text-center py-20">
      <h2 class="text-2xl font-bold text-gray-800 mb-4">Product Not Found</h2>
      <a href="products.html" class="text-pink-500 hover:underline">Back to Shop</a>
    </div>
  </main>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const id = window.getURLParam('id');
      const product = window.appData.products.find(p => p.id === id);
      
      if (!product) {
        document.getElementById('product-container').classList.add('hidden');
        document.getElementById('error-state').classList.remove('hidden');
        return;
      }

      // Populate UI
      document.title = product.name + " - BabyBoutique";
      document.getElementById('product-image').src = product.image;
      document.getElementById('product-image').alt = product.name;
      
      const catEl = document.getElementById('product-category');
      catEl.textContent = product.category;
      catEl.href = `products.html?category=${product.category}`;
      
      document.getElementById('product-name').textContent = product.name;
      document.getElementById('product-rating').textContent = product.rating;
      document.getElementById('product-price').textContent = `$${product.price.toFixed(2)}`;
      document.getElementById('product-desc').textContent = product.description;

      // Analytics Tracking
      window.analytics.trackViewItem(product);

      // Quantity Controls
      const qtyInput = document.getElementById('qty-input');
      document.getElementById('qty-minus').addEventListener('click', () => {
        let val = parseInt(qtyInput.value);
        if(val > 1) qtyInput.value = val - 1;
      });
      document.getElementById('qty-plus').addEventListener('click', () => {
        qtyInput.value = parseInt(qtyInput.value) + 1;
      });

      // Add to Cart
      document.getElementById('add-to-cart-btn').addEventListener('click', () => {
        const qty = parseInt(qtyInput.value) || 1;
        window.state.addToCart(product, qty);
        alert(`Added ${qty} ${product.name} to cart!`);
      });
    });
  </script>
</body>
</html>
