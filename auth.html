<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - BabyBoutique</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="js/analytics.js"></script>
  <script src="js/data.js"></script>
  <script src="js/state.js"></script>
  <script src="js/app.js"></script>
</head>
<body class="bg-gray-50 font-sans text-gray-800 antialiased min-h-screen flex flex-col items-center justify-center">

  <div class="max-w-md w-full bg-white p-8 rounded-3xl shadow-md border border-gray-100">
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold text-gray-800">Welcome Back</h1>
      <p class="text-gray-500 mt-2">Login to BabyBoutique to view orders and checkout faster.</p>
    </div>

    <form id="login-form">
      <div class="mb-5">
        <label class="block text-sm font-medium text-gray-700 mb-1">Email address</label>
        <input type="email" id="email" required placeholder="you@example.com" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-pink-500 focus:border-transparent transition">
      </div>
      <div class="mb-6">
        <label class="block text-sm font-medium text-gray-700 mb-1">Password (Any)</label>
        <input type="password" required placeholder="••••••••" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-pink-500 focus:border-transparent transition">
      </div>
      
      <button type="submit" class="w-full bg-pink-500 hover:bg-pink-600 text-white font-bold py-3 rounded-xl transition shadow hover:shadow-lg">
        Sign In
      </button>
    </form>
    
    <div class="mt-6 text-center text-sm text-gray-500">
      <a href="index.html" class="hover:text-pink-600 font-medium">&larr; Back to Shop</a>
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      // If already logged in, redirect home
      if(window.state.getUser()) {
        window.location.href = "index.html";
      }

      document.getElementById('login-form').addEventListener('submit', (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        window.state.login(email);
        
        const redirect = window.getURLParam('redirect');
        if(redirect === 'cart') {
          window.location.href = "cart.html";
        } else {
          window.location.href = "index.html";
        }
      });
    });
  </script>
</body>
</html>
