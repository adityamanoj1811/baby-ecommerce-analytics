<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Orders - BabyBoutique</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="js/analytics.js"></script>
  <script src="js/data.js"></script>
  <script src="js/state.js"></script>
  <script src="js/app.js"></script>
</head>
<body class="bg-gray-50 font-sans text-gray-800 antialiased min-h-screen flex flex-col">

  <main class="flex-grow max-w-5xl mx-auto px-4 py-8 w-full">
    <h1 class="text-3xl font-bold mb-8">Order History</h1>
    
    <div id="orders-container" class="space-y-6">
      <!-- Added by JS -->
    </div>
    
    <div id="no-orders" class="hidden text-center py-20 bg-white rounded-2xl border border-gray-100 shadow-sm">
      <div class="text-6xl mb-4 opacity-50">📦</div>
      <h2 class="text-2xl font-bold text-gray-800 mb-2">No Orders Yet</h2>
      <p class="text-gray-500 mb-6">Looks like you haven't made any purchases.</p>
      <a href="products.html" class="bg-pink-500 text-white font-bold py-3 px-8 rounded-full hover:bg-pink-600 transition">Start Shopping</a>
    </div>
  </main>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      // Must be logged in
      if(!window.state.getUser()) {
        window.location.href = "auth.html";
        return;
      }

      const orders = window.state.getOrders();
      const container = document.getElementById('orders-container');
      const emptyState = document.getElementById('no-orders');

      if(orders.length === 0) {
        emptyState.classList.remove('hidden');
        return;
      }

      // Reverse so newest first
      orders.slice().reverse().forEach(o => {
        const date = new Date(o.date).toLocaleDateString();
        
        const card = document.createElement('div');
        card.className = "bg-white p-6 rounded-2xl shadow-sm border border-gray-100";
        
        let itemsHtml = o.items.map(i => `
          <div class="flex items-center gap-4 py-4 border-t border-gray-50 last:pb-0">
            <img src="${i.image}" class="w-16 h-16 object-cover rounded bg-gray-100">
            <div class="flex-grow">
              <p class="font-medium text-gray-800">${i.name}</p>
              <p class="text-xs text-gray-500">Qty: ${i.quantity}</p>
            </div>
            <div class="font-semibold text-gray-900">$${(i.price * i.quantity).toFixed(2)}</div>
          </div>
        `).join('');

        card.innerHTML = `
          <div class="flex justify-between items-center mb-4 border-b pb-4">
            <div>
              <p class="text-sm text-gray-500 uppercase tracking-wider">Order Placed</p>
              <p class="font-semibold">${date}</p>
            </div>
            <div>
              <p class="text-sm text-gray-500 uppercase tracking-wider">Total</p>
              <p class="font-semibold">$${o.total.toFixed(2)}</p>
            </div>
            <div class="text-right">
              <p class="text-sm text-gray-500 uppercase tracking-wider">Order ID</p>
              <p class="font-mono text-pink-600">${o.orderId}</p>
            </div>
          </div>
          <div>
            ${itemsHtml}
          </div>
          <div class="mt-4 pt-4 border-t bg-gray-50 p-4 rounded text-sm text-gray-600">
            <span class="font-semibold block mb-1">Shipping To:</span>
            ${o.shipping.name}<br>
            ${o.shipping.address}, ${o.shipping.city} ${o.shipping.zip}
          </div>
        `;
        container.appendChild(card);
      });
    });
  </script>
</body>
</html>
