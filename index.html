<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BabyBoutique - Softest Baby Products</title>
  <meta name="description" content="Shop the best, softest and safest products for your baby.">
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- GA4 & Clarity Tracking -->
  <script src="js/analytics.js"></script>
  <script src="js/data.js"></script>
  <script src="js/state.js"></script>
  <script src="js/app.js"></script>
</head>
<body class="bg-white font-sans text-gray-800 antialiased min-h-screen flex flex-col">

  <!-- Main Content -->
  <main class="flex-grow">
    
    <!-- Hero Section -->
    <section class="bg-amber-50 py-20 px-4">
      <div class="max-w-6xl mx-auto flex flex-col md:flex-row items-center">
        <div class="md:w-1/2 mb-10 md:mb-0">
          <h1 class="text-4xl md:text-5xl font-extrabold text-gray-800 mb-6 leading-tight">
            The Softest Touch for <br/>Your Little One
          </h1>
          <p class="text-lg text-gray-600 mb-8">
            Discover our premium collection of organic clothing, safe toys, and gentle skincare essentials. 
          </p>
          <a href="products.html" class="inline-block bg-pink-500 text-white font-bold py-3 px-8 rounded-full hover:bg-pink-600 transition shadow-lg hover:shadow-xl">
            Shop Now
          </a>
        </div>
        <div class="md:w-1/2">
          <img src="https://images.unsplash.com/photo-1519689680058-324335c77eba?q=80&w=800&auto=format&fit=crop" alt="Happy baby" class="rounded-3xl shadow-2xl object-cover h-96 w-full">
        </div>
      </div>
    </section>

    <!-- Categories -->
    <section class="py-16 px-4 max-w-6xl mx-auto">
      <h2 class="text-2xl font-bold mb-8 text-center text-gray-800">Shop by Category</h2>
      <div class="grid grid-cols-2 md:grid-cols-5 gap-4">
        <a href="products.html?category=Clothing" class="bg-blue-50 p-6 rounded-2xl flex flex-col items-center hover:bg-blue-100 transition">
          <span class="text-4xl mb-2">👕</span>
          <span class="font-medium">Clothing</span>
        </a>
        <a href="products.html?category=Toys" class="bg-yellow-50 p-6 rounded-2xl flex flex-col items-center hover:bg-yellow-100 transition">
          <span class="text-4xl mb-2">🧸</span>
          <span class="font-medium">Toys</span>
        </a>
        <a href="products.html?category=Feeding" class="bg-green-50 p-6 rounded-2xl flex flex-col items-center hover:bg-green-100 transition">
          <span class="text-4xl mb-2">🍼</span>
          <span class="font-medium">Feeding</span>
        </a>
        <a href="products.html?category=Diapers" class="bg-purple-50 p-6 rounded-2xl flex flex-col items-center hover:bg-purple-100 transition">
          <span class="text-4xl mb-2">🧷</span>
          <span class="font-medium">Diapers</span>
        </a>
        <a href="products.html?category=Skincare" class="bg-pink-50 p-6 rounded-2xl flex flex-col items-center hover:bg-pink-100 transition">
          <span class="text-4xl mb-2">🧴</span>
          <span class="font-medium">Skincare</span>
        </a>
      </div>
    </section>

    <!-- Featured Products -->
    <section class="py-16 bg-gray-50 px-4">
      <div class="max-w-6xl mx-auto">
        <h2 class="text-2xl font-bold mb-8 text-center text-gray-800">Featured Products</h2>
        <div id="featured-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-6">
          <!-- Populated by JS -->
        </div>
        <div class="text-center mt-10">
          <a href="products.html" class="inline-block border border-pink-500 text-pink-500 font-bold py-2 px-6 rounded-full hover:bg-pink-50 transition">
            View All Products
          </a>
        </div>
      </div>
    </section>

  </main>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      // Pick 4 top popular products
      const featured = [...window.appData.products].sort((a,b) => b.popularity - a.popularity).slice(0, 4);
      const grid = document.getElementById('featured-grid');
      
      featured.forEach(product => {
        const card = document.createElement('div');
        card.className = "bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden hover:shadow-md transition group";
        card.innerHTML = `
          <a href="product.html?id=${product.id}" class="block relative h-48 overflow-hidden bg-gray-100">
            <img src="${product.image}" loading="lazy" alt="${product.name}" class="w-full h-full object-cover group-hover:scale-105 transition duration-500">
          </a>
          <div class="p-4">
            <p class="text-xs text-pink-500 font-semibold mb-1 uppercase tracking-wider">${product.category}</p>
            <h3 class="font-bold text-gray-800 leading-tight mb-2 h-10 overflow-hidden">
              <a href="product.html?id=${product.id}" class="hover:text-pink-600">${product.name}</a>
            </h3>
            <div class="flex justify-between items-center mt-4">
              <span class="text-lg font-bold text-gray-900">$${product.price.toFixed(2)}</span>
            </div>
          </div>
        `;
        grid.appendChild(card);
      });
    });
  </script>
</body>
</html>
